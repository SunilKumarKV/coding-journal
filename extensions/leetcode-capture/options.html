<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LeetCode Capture Options</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        color: #111827;
      }

      .card {
        max-width: 640px;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        padding: 20px;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #9ca3af;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 12px;
      }

      button {
        background: #111827;
        color: white;
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
      }

      #status {
        margin-top: 12px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>coding-journal Capture</h1>
      <p>Set the local capture endpoint used by the extension.</p>

      <label for="serverUrl">Server URL</label>
      <input id="serverUrl" type="url" placeholder="http://localhost:4444/capture" />

      <button id="saveButton" type="button">Save</button>
      <div id="status" aria-live="polite"></div>
    </div>

    <script src="src/options.js"></script>
  </body>
  </html>
